<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gadget Zone Lanka Cash Book</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

header{
background:#0066ff;
color:white;
padding:18px;
text-align:center;
font-size:25px;
font-weight:bold;
}

.container{
width:95%;
max-width:900px;
margin:auto;
padding:20px;
}

.summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.income{
color:green;
}

.expense{
color:red;
}

.balance{
color:#0066ff;
}

.form{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
}

button{
background:#0066ff;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<header>

Gadget Zone Lanka Cash Book

</header>

<div class="container">

<div class="summary">

<div class="card">

<h3>Total Income</h3>

<h2 class="income" id="income">LKR 0</h2>

</div>

<div class="card">

<h3>Total Expense</h3>

<h2 class="expense" id="expense">LKR 0</h2>

</div>

<div class="card">

<h3>Balance</h3>

<h2 class="balance" id="balance">LKR 0</h2>

</div>

</div>

<div class="form">

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<input id="description" placeholder="Description">

<input id="amount" type="number" placeholder="Amount">

<button>Add Transaction</button>

</div>

<table>

<thead>

<tr>

<th>Type</th>

<th>Description</th>

<th>Amount</th>

</tr>

</thead>

<tbody id="table">

</tbody>

</table>

</div>
<script src="app.js"></script>
</body>
</html>
