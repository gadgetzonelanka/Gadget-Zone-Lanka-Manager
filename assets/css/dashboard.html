<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Gadget Zone Lanka</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
}

header{
background:#0d6efd;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
margin:10px 0;
color:#0d6efd;
}

.card p{
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

Gadget Zone Lanka Manager

</header>

<div class="container">

<div class="card">
<h2>Today's Income</h2>
<p>LKR 0.00</p>
</div>

<div class="card">
<h2>Today's Expenses</h2>
<p>LKR 0.00</p>
</div>

<div class="card">
<h2>Today's Profit</h2>
<p>LKR 0.00</p>
</div>

<div class="card">
<h2>Total Products</h2>
<p>0</p>
</div>

<div class="card">
<h2>Today's Sales</h2>
<p>0</p>
</div>

<div class="card">
<h2>Customers</h2>
<p>0</p>
</div>

</div>

</body>
</html>
